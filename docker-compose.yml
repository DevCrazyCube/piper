# Piper pipeline — local stack (ADR-0004). `docker compose up -d` then `make migrate && make ingest`.
services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${PIPER_DB_NAME}
      POSTGRES_USER: ${PIPER_DB_USER}
      POSTGRES_PASSWORD: ${PIPER_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # pgdata is gitignored; for real "encryption at rest" this host dir lives on a
      # LUKS/dm-crypt encrypted volume (ADR-0008 — community Postgres has no TDE).
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PIPER_DB_USER} -d ${PIPER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      PIPER_DB_HOST: db
    volumes:
      - ./src:/app/src
      - ./db:/app/db
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./alembic.ini:/app/alembic.ini
      - ./datasets:/data/datasets:ro   # raw test data, read-only; never leaves the box
    depends_on:
      db:
        condition: service_healthy
    # Stay up so `docker compose exec app ...` / `make` targets can run pipeline commands.
    command: ["sleep", "infinity"]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      PIPER_DB_HOST: db
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"   # for live demos behind a tunnel (ngrok/cloudflared) — see ADR-0004/0005
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "pipeline.api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # the browser calls the API on the host-mapped port
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep the image's installed deps over the bind mount
    command: ["npm", "run", "dev", "--", "--host", "--port", "5173"]
